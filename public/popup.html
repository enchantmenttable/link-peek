<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <h1 class="popup-title">Link Peek</h1>

    <div class="section">
      <div class="toggle-row">
        <label for="site-toggle">Enable on this site</label>
        <button id="site-toggle" class="toggle" role="switch" aria-checked="true">
          <span class="toggle-slider"></span>
        </button>
      </div>
      <div class="site-name" id="site-name"></div>
    </div>

    <hr>

    <div class="section">
      <div class="toggle-row">
        <label for="modifier-toggle">Require Cmd/Ctrl key</label>
        <button id="modifier-toggle" class="toggle" role="switch" aria-checked="true">
          <span class="toggle-slider"></span>
        </button>
      </div>
    </div>

    <hr>

    <div class="section">
      <label class="section-label">Default panel size</label>
      <div class="size-row">
        <div class="size-field">
          <label for="width-input">W</label>
          <input type="number" id="width-input" min="300" max="1200" step="50">
        </div>
        <span class="size-separator">&times;</span>
        <div class="size-field">
          <label for="height-input">H</label>
          <input type="number" id="height-input" min="200" max="900" step="50">
        </div>
      </div>
    </div>

    <hr>

    <div class="section">
      <label class="section-label">Theme</label>
      <div class="theme-row">
        <button class="theme-btn" data-theme="light">Light</button>
        <button class="theme-btn" data-theme="dark">Dark</button>
        <button class="theme-btn" data-theme="system">System</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
